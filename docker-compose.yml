version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ai_patch_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./ml:/app/ml
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai_patch_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped